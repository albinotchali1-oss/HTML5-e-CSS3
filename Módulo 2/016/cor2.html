<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em css</title>
    <style>
        *{/*Configurações globais das css*/
            height: 100%;
        }
        body{
            background-image: linear-gradient(To bottom, #781EF2, #C314BB, #EA178C,#F2592D,#F6C405);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h2>Testando gradiente</h2>
</body>
</html>
