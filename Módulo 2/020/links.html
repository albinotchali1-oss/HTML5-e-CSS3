<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
            # - id
            . - class
            : - pseudo-class
            :: - pseudo-element
            > - childen
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color: yellow;
        }
        .especial{
            background-color: rgba(255, 107, 107, 0.514);
        }
        .especial::before{
            content: '👉';
        }
        .especial::after{
            /*content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color:brown ;*/
            content: '👈';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/albinotchali1-oss" target="_blank" class="especial">Meu GitHub</a></li>
        <li><a href="https://youtube.com/@tchali-v5i?si=TxloHM7ESAaoL1fv" target="_blank">Canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do curso em video</a></li>
    </ul>
</body>
</html>
