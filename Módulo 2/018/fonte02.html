<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        /*Dafont.com*/
        @font-face {
            font-family: 'love';
            src: url('fonts/Feeling\ Lovely.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            /*
                Tipos de formatos
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg
            */
        }
        @font-face {
            font-family: 'devil';
            src: url('fonts/devil\ candle.otf') format('opentype');
        }
        body{
            font-family: 'devil', Helvetica, sans-serif;
        }
        h1{
            font-family: 'love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit quibusdam eaque, ipsam sit, enim aut rerum eveniet dolorum atque harum minus. Velit et sapiente obcaecati quae sequi, voluptate soluta adipisci.</p>
</body>
</html>
