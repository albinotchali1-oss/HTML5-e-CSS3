<!DOCTYPE html>
<html lang="pt-b">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{/* Boc-level */
            background-color: azure;
            width: 300px;
            height: 300px;

            border: 10px solid rgb(78, 150, 208);
            padding: 10px;
            margin: 20px auto 20px auto;
            outline: 5px dashed rgb(5, 5, 71);
        }
        a{/* inline-level */
            border: 10px solid rgb(224, 219, 83);
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de uma caixa box-level</h1>
    <p>Parágrafos também são exemplo de box-level, mas os <a href="@">links são exemplos de inline-level</a>. Vamos ver como isso funciona.</p>
</body>
</html>
